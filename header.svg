<svg width="1200" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26bbd9;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#26bbd9;stop-opacity:0.6" />
      <stop offset="70%" style="stop-color:#ee64ac;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ee64ac;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#26bbd9;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#26bbd9;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#ee64ac;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#ee64ac;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)" />
  <rect width="1200" height="280" fill="url(#glow1)" />
  <rect width="1200" height="280" fill="url(#glow2)" />

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" />

  <!-- Grid dots (subtle tech aesthetic) -->
  <g opacity="0.08" fill="#58a6ff">
    <circle cx="60" cy="40" r="1" /><circle cx="120" cy="40" r="1" /><circle cx="180" cy="40" r="1" /><circle cx="240" cy="40" r="1" />
    <circle cx="60" cy="80" r="1" /><circle cx="120" cy="80" r="1" /><circle cx="180" cy="80" r="1" /><circle cx="240" cy="80" r="1" />
    <circle cx="60" cy="120" r="1" /><circle cx="120" cy="120" r="1" /><circle cx="180" cy="120" r="1" /><circle cx="240" cy="120" r="1" />
    <circle cx="960" cy="160" r="1" /><circle cx="1020" cy="160" r="1" /><circle cx="1080" cy="160" r="1" /><circle cx="1140" cy="160" r="1" />
    <circle cx="960" cy="200" r="1" /><circle cx="1020" cy="200" r="1" /><circle cx="1080" cy="200" r="1" /><circle cx="1140" cy="200" r="1" />
    <circle cx="960" cy="240" r="1" /><circle cx="1020" cy="240" r="1" /><circle cx="1080" cy="240" r="1" /><circle cx="1140" cy="240" r="1" />
  </g>

  <!-- Name -->
  <text x="600" y="105" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">
    e1ix0r
  </text>

  <!-- Role -->
  <text x="600" y="145" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle" letter-spacing="2">
    FULL-STACK FOUNDER  &amp;  PLATFORM ARCHITECT
  </text>

  <!-- Tags -->
  <text x="600" y="190" font-family="monospace, 'Courier New'" font-size="14" fill="#58a6ff" text-anchor="middle" letter-spacing="1">
    tourscale  //  franchise ops  //  self-hosted  //  nixos
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="278" width="1200" height="2" fill="url(#accent)" />
</svg>
