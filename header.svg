<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1e26;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#232530;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c1e26;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="40%" r="30%">
      <stop offset="0%" style="stop-color:#26bbd9;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#26bbd9;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="60%" r="25%">
      <stop offset="0%" style="stop-color:#ee64ac;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ee64ac;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="30%" r="20%">
      <stop offset="0%" style="stop-color:#59e3e3;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#59e3e3;stop-opacity:0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" />

  <!-- Ambient glows -->
  <rect width="1200" height="300" fill="url(#glow1)" />
  <rect width="1200" height="300" fill="url(#glow2)" />
  <rect width="1200" height="300" fill="url(#glow3)" />

  <!-- Accent lines -->
  <line x1="0" y1="298" x2="1200" y2="298" stroke="#26bbd9" stroke-width="2" opacity="0.6" />
  <line x1="0" y1="0" x2="400" y2="0" stroke="#ee64ac" stroke-width="2" opacity="0.4" />
  <line x1="800" y1="0" x2="1200" y2="0" stroke="#26bbd9" stroke-width="2" opacity="0.4" />

  <!-- Scattered stars -->
  <circle cx="100" cy="50" r="1.5" fill="#fadad1" opacity="0.6" />
  <circle cx="250" cy="120" r="1" fill="#fadad1" opacity="0.4" />
  <circle cx="380" cy="30" r="1.5" fill="#59e3e3" opacity="0.5" />
  <circle cx="500" cy="80" r="1" fill="#fadad1" opacity="0.3" />
  <circle cx="650" cy="45" r="1.5" fill="#fadad1" opacity="0.5" />
  <circle cx="780" cy="100" r="1" fill="#ee64ac" opacity="0.4" />
  <circle cx="900" cy="35" r="1.5" fill="#fadad1" opacity="0.6" />
  <circle cx="1050" cy="75" r="1" fill="#26bbd9" opacity="0.5" />
  <circle cx="1120" cy="130" r="1.5" fill="#fadad1" opacity="0.4" />
  <circle cx="180" cy="200" r="1" fill="#fadad1" opacity="0.3" />
  <circle cx="350" cy="250" r="1.5" fill="#fadad1" opacity="0.5" />
  <circle cx="550" cy="220" r="1" fill="#59e3e3" opacity="0.3" />
  <circle cx="720" cy="260" r="1.5" fill="#fadad1" opacity="0.4" />
  <circle cx="950" cy="200" r="1" fill="#ee64ac" opacity="0.3" />
  <circle cx="1080" cy="240" r="1.5" fill="#fadad1" opacity="0.5" />
  <circle cx="450" cy="170" r="1" fill="#26bbd9" opacity="0.4" />
  <circle cx="830" cy="180" r="1" fill="#fadad1" opacity="0.3" />

  <!-- Event Horizon ring (simplified black hole) -->
  <ellipse cx="600" cy="150" rx="120" ry="40" fill="none" stroke="#26bbd9" stroke-width="1.5" opacity="0.3" />
  <ellipse cx="600" cy="150" rx="90" ry="30" fill="none" stroke="#3fc4de" stroke-width="1" opacity="0.2" />
  <ellipse cx="600" cy="150" rx="150" ry="50" fill="none" stroke="#ee64ac" stroke-width="0.8" opacity="0.15" />
  <circle cx="600" cy="150" r="18" fill="#1c1e26" />
  <circle cx="600" cy="150" r="18" fill="none" stroke="#26bbd9" stroke-width="1" opacity="0.5" />

  <!-- Title text -->
  <text x="600" y="140" font-family="monospace, 'Courier New'" font-size="48" font-weight="bold" fill="#fadad1" text-anchor="middle" opacity="0.95">
    EVENT HORIZON
  </text>

  <!-- Subtitle -->
  <text x="600" y="175" font-family="monospace, 'Courier New'" font-size="16" fill="#6c6f93" text-anchor="middle" letter-spacing="6">
    e1ix0r  //  NixOS  //  Wayland  //  Infrastructure
  </text>

  <!-- Color dots at bottom -->
  <circle cx="510" cy="230" r="5" fill="#e95678" />
  <circle cx="530" cy="230" r="5" fill="#ee64ac" />
  <circle cx="550" cy="230" r="5" fill="#26bbd9" />
  <circle cx="570" cy="230" r="5" fill="#3fc4de" />
  <circle cx="590" cy="230" r="5" fill="#59e3e3" />
  <circle cx="610" cy="230" r="5" fill="#29d398" />
  <circle cx="630" cy="230" r="5" fill="#fab795" />
  <circle cx="650" cy="230" r="5" fill="#fadad1" />
  <circle cx="670" cy="230" r="5" fill="#6c6f93" />
  <circle cx="690" cy="230" r="5" fill="#1c1e26" stroke="#6c6f93" stroke-width="1" />
</svg>
